<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">StuffSycle AI-assisted delivery system</title><desc id="desc">A delivery chain from research and decisions in Obsidian through Linear, Figma Make, Cursor and Claude Code to Git, Supabase and Vercel.</desc>
  <rect width="1600" height="900" fill="#F7F7FB"/>
  <style>text{font-family:Arial,sans-serif}.eyebrow{font-size:18px;font-weight:700;letter-spacing:1.5px;fill:#6558E8}.title{font-size:56px;font-weight:700;fill:#17171D}.sub{font-size:24px;fill:#666672}.h{font-size:24px;font-weight:700;fill:#17171D}.p{font-size:18px;fill:#666672}.card{fill:#FFFFFF;stroke:#DEDEE8;stroke-width:2}.accent{fill:#EEECFF;stroke:#7467EF;stroke-width:2}.line{stroke:#7467EF;stroke-width:5;fill:none}.dash{stroke:#9B94ED;stroke-width:3;stroke-dasharray:10 10;fill:none}</style>
  <text x="100" y="95" class="eyebrow">STUFFSYCLE · AI-ASSISTED DELIVERY SYSTEM</text>
  <text x="100" y="155" class="title">AI accelerated execution.</text>
  <text x="100" y="215" class="title">Product judgment stayed human-owned.</text>
  <text x="100" y="260" class="sub">Each tool had one source-of-truth responsibility instead of sharing one giant chat context.</text>
